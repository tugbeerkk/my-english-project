<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 2: School Trip Runner</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        .choice-btn {
            @apply w-full p-4 bg-white border-2 border-gray-200 rounded-2xl text-lg font-bold transition-all hover:border-yellow-500 hover:bg-yellow-50 active:scale-95 shadow-sm;
        }
        .bus-move {
            transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-indigo-900 min-h-screen text-white font-sans flex flex-col items-center justify-center p-4">
    
    <div class="max-w-xl w-full">
        <a href="/" class="text-indigo-300 font-medium mb-6 inline-block hover:text-white transition">← Back to 10th grade English platform</a>

        <!-- Game Dashboard -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 text-gray-800 relative overflow-hidden">
            
            <!-- Progress Bar (The Road) -->
            <div id="game-progress" class="hidden">
                <div class="relative w-full h-16 bg-gray-200 rounded-xl mb-8 overflow-hidden border-4 border-gray-300">
                    <div class="absolute inset-0 flex items-center justify-between px-4 opacity-20">
                        <span class="text-2xl">🏫</span>
                        <span class="text-2xl">🚌</span>
                    </div>
                    <div id="bus-icon" class="bus-move absolute left-0 top-1/2 -translate-y-1/2 text-4xl ml-2">🚌</div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <div class="text-sm font-bold text-gray-400 uppercase tracking-widest">Time Left</div>
                    <div id="timer" class="text-2xl font-black text-red-500">20s</div>
                </div>

                <div id="scenario-box" class="mb-8">
                    <h2 id="scenario-text" class="text-2xl font-black mb-4 leading-tight italic text-indigo-900 underline decoration-yellow-400 underline-offset-8"></h2>
                    <p class="text-gray-500 font-medium">What do you do?</p>
                </div>

                <div id="choices" class="grid grid-cols-1 gap-4">
                    <!-- Choices here -->
                </div>
            </div>

            <!-- Start Screen -->
            <div id="start-screen" class="text-center py-8">
                <div class="text-6xl mb-6">🎒</div>
                <h1 class="text-4xl font-black mb-4">School Trip Runner</h1>
                <p class="text-gray-500 mb-8 px-4">The bus is leaving soon! Quick! Listen to announcements, plan your trip, and don't get distracted!</p>
                <button onclick="startGame()" class="bg-yellow-400 hover:bg-yellow-500 text-black px-10 py-4 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95">GO! 🚌</button>
            </div>

            <!-- End Screen -->
            <div id="end-screen" class="hidden text-center py-8">
                <div id="end-emoji" class="text-7xl mb-6">🚌</div>
                <h2 id="end-title" class="text-3xl font-black mb-2"></h2>
                <p id="end-desc" class="text-gray-500 mb-8"></p>
                <div class="text-5xl font-black text-indigo-600 mb-8" id="final-score">0</div>
                <button onclick="location.reload()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95">Play Again</button>
            </div>

        </div>
    </div>

    <script>
        const scenarios = [
            // Original 7
            { text: "Teacher is speaking...", choices: [{t: "Listen carefully", v: true}, {t: "Sleep", v: false}] },
            { text: "You see a timetable...", choices: [{t: "Scan for info", v: true}, {t: "Ignore", v: false}] },
            { text: "You hear an announcement...", choices: [{t: "Listen for details", v: true}, {t: "Talk with friend", v: false}] },
            { text: "You are planning...", choices: [{t: "Make a checklist", v: true}, {t: "Just wing it", v: false}] },
            { text: "The bus driver arrives...", choices: [{t: "Check boarding pass", v: true}, {t: "Search for snacks", v: false}] },
            { text: "Studying the map...", choices: [{t: "Find the route", v: true}, {t: "Look at pictures", v: false}] },
            { text: "Notice a sign says 'Departing'...", choices: [{t: "Run to gate", v: true}, {t: "Buy a magazine", v: false}] },
            
            // New 23
            { text: "You receive an email about the trip...", choices: [{t: "Read the itinerary", v: true}, {t: "Archive it", v: false}] },
            { text: "The guide begins the tour...", choices: [{t: "Follow closely", v: true}, {t: "Look at your phone", v: false}] },
            { text: "A classmate is being loud...", choices: [{t: "Focus on the guide", v: true}, {t: "Join the noise", v: false}] },
            { text: "Gathering at 2 PM sharp...", choices: [{t: "Set a reminder", v: true}, {t: "Guess the time", v: false}] },
            { text: "The museum is very large...", choices: [{t: "Use the site map", v: true}, {t: "Walk aimlessly", v: false}] },
            { text: "Teacher asks for a volunteer...", choices: [{t: "Raise your hand", v: true}, {t: "Look at the floor", v: false}] },
            { text: "Sign says 'No Photography'...", choices: [{t: "Put camera away", v: true}, {t: "Take a secret selfie", v: false}] },
            { text: "Group is moving to the lobby...", choices: [{t: "Stay with the group", v: true}, {t: "Explore the basement", v: false}] },
            { text: "Hungry during the lecture...", choices: [{t: "Wait for lunch break", v: true}, {t: "Eat a noisy snack", v: false}] },
            { text: "A quiz is coming tomorrow...", choices: [{t: "Take brief notes", v: true}, {t: "Watch the clock", v: false}] },
            { text: "Checklist says 'Bring Water'...", choices: [{t: "Pack a bottle", v: true}, {t: "Buy soda later", v: false}] },
            { text: "Discussion about history starts...", choices: [{t: "Contribute an idea", v: true}, {t: "Draw in notebook", v: false}] },
            { text: "Phone battery is very low...", choices: [{t: "Save it for emergencies", v: true}, {t: "Play loud music", v: false}] },
            { text: "It starts to rain outside...", choices: [{t: "Open your umbrella", v: true}, {t: "Complain about weather", v: false}] },
            { text: "Meeting point has changed...", choices: [{t: "Go to the new spot", v: true}, {t: "Wait at the old one", v: false}] },
            { text: "Teacher shows a rare artifact...", choices: [{t: "Observe details", v: true}, {t: "Look at the ceiling", v: false}] },
            { text: "Audio guide is available...", choices: [{t: "Grab the headset", v: true}, {t: "Ignore the station", v: false}] },
            { text: "Someone drops their bag...", choices: [{t: "Help them pick it up", v: true}, {t: "Walk past quickly", v: false}] },
            { text: "The presentation is ending...", choices: [{t: "Prepare a question", v: true}, {t: "Pack bags early", v: false}] },
            { text: "Rule: 'Keep to the right'...", choices: [{t: "Follow the path", v: true}, {t: "Run on the left", v: false}] },
            { text: "Announcement: 'Final Call'...", choices: [{t: "Hurry to the bus", v: true}, {t: "Finish your drink", v: false}] },
            { text: "Teacher checks the roster...", choices: [{t: "Say 'Present!'", v: true}, {t: "Hide behind a pole", v: false}] },
            { text: "Emergency exit is pointed out...", choices: [{t: "Remember location", v: true}, {t: "Close your eyes", v: false}] }
        ];

        let score = 0;
        let timeLeft = 20;
        let gameActive = false;
        let timer;
        const GOAL = 15; // Increased goal

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-progress').classList.remove('hidden');
            gameActive = true;
            score = 0;
            timeLeft = 20;
            loadScenario();
            startTimer();
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft + 's';
                if (timeLeft <= 0) endGame("Time's Up!", "You missed the bus! 😢", "⏰");
            }, 1000);
        }

        function loadScenario() {
            if (!gameActive) return;
            const s = scenarios[Math.floor(Math.random() * scenarios.length)];
            document.getElementById('scenario-text').textContent = s.text;
            const container = document.getElementById('choices');
            container.innerHTML = '';

            // Shuffle choices
            const shuffled = [...s.choices].sort(() => Math.random() - 0.5);

            shuffled.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = c.t;
                btn.onclick = () => handleChoice(c.v);
                container.appendChild(btn);
            });
        }

        function handleChoice(isCorrect) {
            if (!isCorrect) {
                endGame("Oh no!", "You got distracted and lost the way!", "😵");
                return;
            }
            score++;
            updateBus();
            if (score >= GOAL) {
                endGame("You Made It!", "You arrived just in time for the trip!", "🎉");
            } else {
                loadScenario();
            }
        }

        function updateBus() {
            const bus = document.getElementById('bus-icon');
            const percent = (score / GOAL) * 85; 
            bus.style.left = percent + '%';
        }

        function endGame(title, desc, emoji) {
            gameActive = false;
            clearInterval(timer);
            document.getElementById('game-progress').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-title').textContent = title;
            document.getElementById('end-desc').textContent = desc;
            document.getElementById('end-emoji').textContent = emoji;
            document.getElementById('final-score').textContent = score + " steps";
        }
    </script>
</body>
</html>
