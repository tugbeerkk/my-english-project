<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Traveler's Duel - V3 Master</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { font-family: 'Space Grotesk', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .time-portal {
            background: radial-gradient(circle at center, #4f46e5 0%, #0f172a 70%);
        }
        
        .hp-bar {
            @apply h-4 bg-slate-800 rounded-full border border-slate-700 overflow-hidden;
        }
        .hp-fill {
            @apply h-full transition-all duration-500 ease-out;
        }
        
        .duel-card {
            @apply bg-slate-900 border-2 border-slate-800 rounded-[2rem] p-6 shadow-2xl;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.3; }
        }
        .damage-overlay {
            @apply fixed inset-0 bg-red-600 pointer-events-none;
            animation: pulse-red 0.5s ease-out;
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen overflow-hidden">

    <!-- Use 4.6.0 which is highly compatible with python-socketio 5.x -->
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <div id="lobby-container" class="relative min-h-screen p-8 flex flex-col items-center justify-center">
        <!-- Back to Menu button -->
        <a href="/" class="absolute top-8 left-8 flex items-center gap-2 text-slate-500 hover:text-white transition-all uppercase font-black text-xs tracking-widest bg-slate-800/50 px-4 py-2 rounded-lg border border-slate-700">
            ← Ana Menü
        </a>

        <div class="duel-card max-w-md w-full relative">
            <h2 class="text-3xl font-black italic tracking-tighter mb-8 bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent text-center">TIME DUEL</h2>
            
            <div class="space-y-6">
                <!-- Create Room -->
                <button id="create-btn" class="w-full py-4 bg-indigo-600 rounded-xl font-black uppercase tracking-widest hover:bg-indigo-500 transition-all transform active:scale-95 shadow-lg shadow-indigo-500/20">
                    Yeni Oda Oluştur
                </button>

                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700"></div></div>
                    <div class="relative flex justify-center text-xs uppercase font-bold text-slate-500 bg-slate-900 px-4">VEYA</div>
                </div>

                <!-- Join Room -->
                <div class="space-y-4">
                    <input type="text" id="room-code-input" placeholder="Oda Kodunu Gir" maxlength="4" class="w-full px-6 py-4 bg-slate-800/50 border border-slate-700 rounded-xl text-center font-black text-2xl tracking-widest focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-white">
                    <button id="join-btn" class="w-full py-4 bg-purple-600 rounded-xl font-black uppercase tracking-widest hover:bg-purple-500 transition-all transform active:scale-95 shadow-lg shadow-purple-500/20">
                        Odaya Katıl
                    </button>
                </div>
            </div>

            <!-- Connection Status -->
            <div class="mt-8 flex items-center justify-center gap-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
                <span id="status-text" class="text-[10px] font-black uppercase tracking-widest text-slate-500">Bağlanılıyor...</span>
            </div>

            <!-- Waiting Modal -->
            <div id="waiting-modal" class="hidden absolute inset-0 bg-slate-900 flex flex-col items-center justify-center p-8 z-50 rounded-[2rem] border-2 border-indigo-500/50">
                <div class="text-xs font-black text-indigo-400 uppercase tracking-widest mb-2">ODA KODUNUZ</div>
                <div class="text-7xl font-black text-white mb-2 drop-shadow-[0_0_20px_rgba(79,70,229,0.6)] cursor-pointer hover:scale-105 transition-transform" id="display-code" onclick="copyCode()">0000</div>
                <div id="copy-status" class="text-[10px] text-emerald-400 font-bold uppercase mb-6 opacity-0 transition-opacity">KOD KOPYALANDI!</div>
                <p class="text-slate-400 text-center text-sm font-medium leading-relaxed max-w-[220px]">Arkadaşın bu kodu girince düello otomatik olarak başlayacak.</p>
                <button id="cancel-btn" class="mt-8 px-6 py-2 border border-slate-700 text-slate-500 hover:text-white hover:border-white text-xs font-black uppercase tracking-widest rounded-full transition-all">İptal Et</button>
            </div>
        </div>
    </div>

    <!-- Incoming Challenge Modal -->
    <div id="challenge-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-950/90 backdrop-blur-xl">
        <div class="duel-card max-w-sm w-full text-center p-10 animate-in fade-in zoom-in duration-300">
            <div class="text-6xl mb-6">⚔️</div>
            <h2 class="text-2xl font-black mb-2">New Challenge!</h2>
            <p id="challenger-text" class="text-slate-400 mb-8"></p>
            <div class="flex gap-4">
                <button onclick="acceptChallenge()" class="flex-1 py-4 bg-indigo-600 hover:bg-indigo-700 rounded-xl font-black transition-all">ACCEPT</button>
                <button onclick="closeChallenge()" class="flex-1 py-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-black transition-all">DECLINE</button>
            </div>
        </div>
    </div>

    <div id="game-container" class="relative min-h-screen p-8 flex flex-col hidden">
        <!-- Header -->
        <header class="flex justify-between items-center mb-12">
            <div class="text-indigo-400 font-bold flex items-center gap-2">
                <span class="mono">ROOM:</span> <span id="match-id" class="text-white">...</span>
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-black tracking-widest uppercase text-indigo-500">Time Duel</h1>
                <p class="text-xs font-mono text-slate-500">PROTOCOL: LIVE_SYNC</p>
            </div>
            <div class="text-right">
                <div id="winner-tag" class="hidden font-black text-emerald-400 animate-pulse uppercase tracking-widest">VICTORY</div>
            </div>
        </header>

        <!-- Battle Arena -->
        <div class="flex-grow flex flex-col md:flex-row items-center justify-around gap-12 relative lg:px-20">
            
            <!-- Player -->
            <div class="w-full max-w-xs space-y-6 text-center">
                <div class="relative inline-block">
                    <div id="p1-avatar" class="w-24 h-24 bg-indigo-600 rounded-2xl flex items-center justify-center text-5xl shadow-[0_0_50px_rgba(79,70,229,0.4)] relative z-10 transition-all duration-500">🦸‍♂️</div>
                    <div class="absolute -inset-4 bg-indigo-500/20 blur-xl rounded-full"></div>
                </div>
                <div>
                    <h3 id="p1-name" class="font-black text-xl mb-3">You</h3>
                    <div class="hp-bar">
                        <div id="p1-hp-bar" class="hp-fill bg-indigo-500" style="width: 100%"></div>
                    </div>
                </div>
            </div>

            <!-- VS Center -->
            <div class="relative z-10 flex flex-col items-center">
                <div id="v1-orb" class="w-48 h-48 bg-white/5 border-2 border-indigo-500/30 rounded-full flex flex-col items-center justify-center backdrop-blur-xl floating shadow-[0_0_100px_rgba(79,70,229,0.2)]">
                    <span class="text-xs font-black text-indigo-500/60 mb-2 mono">TASK</span>
                    <span id="base-verb" class="text-4xl font-black tracking-tighter uppercase text-white">READY?</span>
                </div>
                <div class="mt-8">
                    <input type="text" id="answer-input" placeholder="Type V3 Form..." 
                           class="bg-slate-800/50 border-2 border-indigo-500/50 rounded-2xl px-6 py-4 text-xl font-bold text-center outline-none focus:border-indigo-400 focus:bg-slate-800 transition-all w-64 placeholder:text-slate-600"
                           autocomplete="off">
                </div>
            </div>

            <!-- Rival -->
            <div class="w-full max-w-xs space-y-6 text-center">
                <div class="relative inline-block">
                    <div id="p2-avatar" class="w-24 h-24 bg-rose-600 rounded-2xl flex items-center justify-center text-5xl shadow-[0_0_50px_rgba(225,29,72,0.4)] relative z-10 transition-all duration-500">👨‍🚀</div>
                    <div class="absolute -inset-4 bg-rose-500/20 blur-xl rounded-full"></div>
                </div>
                <div>
                    <h3 id="p2-name" class="font-black text-xl mb-3">Opponent</h3>
                    <div class="hp-bar">
                        <div id="p2-hp-bar" class="hp-fill bg-rose-500" style="width: 100%"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Victory Modal -->
    <div id="victory-modal" class="fixed inset-0 z-50 items-center justify-center bg-indigo-950/90 backdrop-blur-3xl hidden">
        <div class="text-center max-w-lg p-12 duel-card border-indigo-500">
            <div class="text-9xl mb-10 animate-bounce">🏆</div>
            <h2 id="end-title" class="text-5xl font-black mb-4 tracking-tighter uppercase"></h2>
            <p id="end-text" class="text-xl text-indigo-200 mb-10 font-medium italic"></p>
            <button onclick="location.reload()" class="w-full py-6 bg-white text-indigo-900 rounded-3xl font-black text-2xl hover:scale-105 transition-all">LOBBY</button>
        </div>
    </div>

    <script>
        // Automatic selection of protocols
        const socket = io();

        const currentUsername = localStorage.getItem('username') || `Traveler_${Math.floor(Math.random()*1000)}`;
        
        let p1Data = null;
        let p2Data = null;

        // Elements
        const lobbyContainer = document.getElementById('lobby-container');
        const gameContainer = document.getElementById('game-container');
        const input = document.getElementById('answer-input');
        
        const createBtn = document.getElementById('create-btn');
        const joinBtn = document.getElementById('join-btn');
        const roomCodeInput = document.getElementById('room-code-input');
        const waitingModal = document.getElementById('waiting-modal');
        const displayCode = document.getElementById('display-code');
        const cancelBtn = document.getElementById('cancel-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        // Socket Status
        socket.on('connect', () => {
            statusDot.classList.remove('bg-yellow-500', 'bg-red-500');
            statusDot.classList.add('bg-emerald-500');
            statusText.textContent = "Bağlı";
            console.log('Connected to timeline with ID:', socket.id);
        });

        socket.on('connect_error', (err) => {
            console.error('Connection error:', err);
            statusText.textContent = "Hata: " + err.message;
        });

        socket.on('disconnect', () => {
            statusDot.classList.remove('bg-emerald-500', 'bg-yellow-500');
            statusDot.classList.add('bg-red-500');
            statusText.textContent = "Bağlantı Kesildi";
        });

        // Back button and room code handling
        function copyCode() {
            const code = displayCode.textContent;
            if (code === "0000" || code === "----") return;
            
            navigator.clipboard.writeText(code).then(() => {
                const status = document.getElementById('copy-status');
                status.classList.remove('opacity-0');
                setTimeout(() => status.classList.add('opacity-0'), 2000);
            }).catch(err => {
                console.error('Copy failed:', err);
                const el = document.createElement('textarea');
                el.value = code;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                const status = document.getElementById('copy-status');
                status.classList.remove('opacity-0');
                setTimeout(() => status.classList.add('opacity-0'), 2000);
            });
        }

        // Socket Events
        createBtn.onclick = () => {
            if (!socket.connected) {
                alert('Sunucuya bağlanılamadı. Lütfen sayfayı yenileyin.');
                return;
            }
            console.log('Oda oluşturuluyor...', currentUsername);
            displayCode.textContent = "...."; // Loading state
            socket.emit('create_room', currentUsername);
            
            // Timeout check
            setTimeout(() => {
                if (displayCode.textContent === "....") {
                    alert('Oda oluşturma zaman aşımına uğradı. Tekrar deneyin.');
                    displayCode.textContent = "----";
                }
            }, 5000);
        };

        socket.on('room_created', (code) => {
            console.log('Oda oluşturuldu. Kod:', code);
            displayCode.textContent = code;
            waitingModal.classList.remove('hidden');
        });

        cancelBtn.onclick = () => {
            const code = displayCode.textContent;
            socket.emit('cancel_room', code);
            waitingModal.classList.add('hidden');
            displayCode.textContent = "0000";
        };

        joinBtn.onclick = () => {
            const code = roomCodeInput.value.trim();
            if (code.length === 4) {
                console.log('Odaya katılınıyor:', code);
                socket.emit('join_room_code', { code, username: currentUsername });
            } else {
                alert('Lütfen 4 haneli oda kodunu girin.');
            }
        };

        socket.on('error', (msg) => alert(msg));

        socket.on('match_start', (data) => {
            waitingModal.classList.add('hidden');
            lobbyContainer.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            document.getElementById('match-id').textContent = data.matchId;
            
            // Determine who is local player
            const isP1 = data.p1.id === socket.id;
            p1Data = isP1 ? data.p1 : data.p2;
            p2Data = isP1 ? data.p2 : data.p1;

            document.getElementById('p1-name').textContent = p1Data.username + " (You)";
            document.getElementById('p2-name').textContent = p2Data.username;
            
            input.value = "";
            input.focus();
        });

        socket.on('new_verb', (v1) => {
            document.getElementById('base-verb').textContent = v1;
            input.value = "";
            input.focus();
        });

        input.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (val !== "") {
                socket.emit('submit_answer', val);
            }
        });

        socket.on('match_update', (data) => {
            // Re-map HP based on who we are
            const isP1 = data.p1.id === socket.id;
            const myHp = isP1 ? data.p1.hp : data.p2.hp;
            const oppHp = isP1 ? data.p2.hp : data.p1.hp;

            document.getElementById('p1-hp-bar').style.width = myHp + "%";
            document.getElementById('p2-hp-bar').style.width = oppHp + "%";

            // Damage effect
            if (data.attacker_id !== socket.id) {
                // We got hit
                document.getElementById('p1-avatar').classList.add('scale-90', 'opacity-50', 'bg-red-600');
                setTimeout(() => document.getElementById('p1-avatar').classList.remove('scale-90', 'opacity-50', 'bg-red-600'), 200);
            } else {
                // Opponent got hit
                document.getElementById('p2-avatar').classList.add('scale-90', 'opacity-50', 'bg-red-600');
                setTimeout(() => document.getElementById('p2-avatar').classList.remove('scale-90', 'opacity-50', 'bg-red-600'), 200);
            }
        });

        socket.on('match_end', (data) => {
            const modal = document.getElementById('victory-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            document.getElementById('end-title').textContent = data.winner === currentUsername ? "VICTORY!" : "DEFEAT!";
            document.getElementById('end-text').textContent = data.winner === currentUsername ? 
                "You secured the timeline with your faster reflexes." : 
                "The timeline was altered. Better luck next time.";
        });
    </script>
</body>
</html>
