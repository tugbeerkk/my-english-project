<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us - English Quest</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-pink-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md border-b-8 border-pink-200">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-pink-600 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-4 shadow-lg shadow-pink-100">✨</div>
            <h2 class="text-4xl font-black text-pink-900 tracking-tighter uppercase leading-none mb-4">10th Grade English</h2>
            <h2 class="text-2xl font-black text-pink-500 tracking-tighter uppercase">New Account</h2>
            <p class="text-pink-400 font-bold mt-2">Start your digital English journey</p>
        </div>
        <div id="message" class="hidden p-4 mb-6 rounded-2xl text-sm font-bold"></div>
        <form id="registerForm" class="space-y-6">
            <div>
                <label class="block text-xs font-black text-pink-900 uppercase tracking-widest mb-2 ml-1">Username</label>
                <input type="text" id="username" required class="w-full p-4 bg-pink-50 border-2 border-pink-100 rounded-2xl outline-none focus:border-pink-500 transition-colors font-bold text-pink-900">
            </div>
            <div>
                <label class="block text-xs font-black text-pink-900 uppercase tracking-widest mb-2 ml-1">Password</label>
                <input type="password" id="password" required class="w-full p-4 bg-pink-50 border-2 border-pink-100 rounded-2xl outline-none focus:border-pink-500 transition-colors font-bold text-pink-900">
            </div>
            <button type="submit" class="w-full bg-pink-600 text-white py-4 rounded-2xl font-black text-xl shadow-xl shadow-pink-100 hover:bg-pink-700 transition active:scale-95">REGISTER NOW 🚀</button>
        </form>
        <p class="mt-8 text-center text-sm font-bold text-pink-400">
            Already registered? <a href="/login.html" class="text-pink-600 hover:underline">Login Here</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const msgDiv = document.getElementById('message');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (res.ok) {
                msgDiv.textContent = 'Account created! Redirecting to login...';
                msgDiv.className = 'p-3 mb-4 rounded text-sm bg-green-100 text-green-700';
                msgDiv.classList.remove('hidden');
                setTimeout(() => window.location.href = '/login.html', 1500);
            } else {
                msgDiv.textContent = data.error;
                msgDiv.className = 'p-3 mb-4 rounded text-sm bg-red-100 text-red-700';
                msgDiv.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
